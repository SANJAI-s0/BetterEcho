# ──────────────────────────────────────────────────────────────────────────────
# BetterEcho AI — CI/CD Pipeline
# Triggers on every push to main and every Pull Request
# ──────────────────────────────────────────────────────────────────────────────

name: BetterEcho CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Code Quality Check ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install flake8

      - name: Lint backend with flake8
        run: |
          flake8 backend/app.py \
            --max-line-length=120 \
            --ignore=E501,W503,E302 \
            --exclude=.venv

      - name: Check Dockerfile exists
        run: test -f Dockerfile && echo "✅ Dockerfile found"

      - name: Check render.yaml exists
        run: test -f render.yaml && echo "✅ render.yaml found"

  # ── Job 2: Docker Build Test ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (tiny model for speed in CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false    # Just validate the build — don't push
          build-args: |
            WHISPER_MODEL=tiny
          tags: betterecho:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Render ────────────────────────────────────────────────
  # Runs only when code is merged/pushed to main AND both jobs above pass
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [ quality, docker-build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Render deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Render deploy failed (HTTP $RESPONSE)"
            exit 1
          fi
